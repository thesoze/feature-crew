# Feature Crew Configuration Template
# Copy to config.toml and customize for your project

[project]
name = "myproject"
repo_path = "/path/to/myproject"
description = "My awesome Python project"
version = "0.1.0"

[infrastructure]
redis_url = "redis://localhost:6379"
spark_url = "http://localhost:30001"
log_level = "INFO"
log_file = "logs/feature-crew.log"

# ============================================================
# TIER 1: Autonomous (Local LLM)
# Size: XS (<20 LOC, 1 file)
# Risk: Low
# Cost: ~$0.0005 per task
# Speed: 30-60 seconds
# ============================================================

[tier1]
enabled = true
model = "qwen3-235b"  # Options: qwen3-235b, llama3-70b, mistral-7b, etc.
model_type = "vllm"   # Options: vllm, ollama, local, api

# If using vLLM locally:
vllm_endpoint = "http://localhost:8000/v1"

# If using Ollama:
# model = "qwen2.5:72b"
# ollama_endpoint = "http://localhost:11434"

# If using Claude API tier-1 (not recommended, use tier2 instead):
# model = "claude-3-5-haiku"
# api_key = "${ANTHROPIC_API_KEY}"

# Aider integration
use_aider = true
aider_model = "qwen3"  # Aider's model identifier
guardrail_file = "guardrails/tier1-f2.md"  # Optional: teach-to-ask guardrail
aider_timeout_seconds = 300

[tier1.self_audit]
tools = ["pytest", "ruff", "mypy", "compile"]
pytest_args = ["tests/", "-v", "--tb=short"]
ruff_args = ["check", "src/", "--select=E9,F63,F7,F82"]
mypy_args = ["src/", "--show-error-codes"]
max_files = 3

[tier1.review]
checks = ["audit_verdict", "diff_size", "file_count", "spec_adherence", "suspicious_patterns"]
max_files = 3
min_diff_size = 50
max_diff_size = 50000

# ============================================================
# TIER 2: Spark with DeepSeek-V3 (Extended Thinking)
# Size: S/M (50-500 LOC, up to 10 files)
# Risk: Medium
# Cost: ~$0.001/task (amortized Spark hardware)
# Speed: 1-3 minutes (with extended thinking)
# ============================================================

[tier2]
enabled = true
model = "deepseek-v3"                   # Extended thinking variant
model_type = "vllm"
vllm_endpoint = "http://localhost:8001/v1"  # Separate vLLM instance for tier2
use_thinking = true                     # Enable extended reasoning
thinking_budget = 10000                 # Max thinking tokens
hf_cache = "/mnt/shared_workspace/huggingface"  # Shared model cache
use_aider = true
aider_model = "deepseek-v3"
guardrail_file = "guardrails/tier2-context.md"
aider_timeout_seconds = 600

[tier2.self_audit]
tools = ["pytest", "ruff", "mypy", "compile", "bandit"]  # Stricter: add bandit
pytest_args = ["tests/", "-v", "--tb=short"]
max_files = 10

[tier2.review]
checks = ["audit_verdict", "diff_size", "file_count", "spec_adherence", "suspicious_patterns", "imports_check"]
max_files = 10
max_diff_size = 100000

# ============================================================
# TIER 3a: Medium-Risk (DeepSeek-V3 via Spark)
# Size: M/L (100-300 LOC, moderate logic)
# Risk: Medium
# Cost: ~$0.001 generation + $0.05 review = $0.05/task
# Speed: 2-3 minutes
# Examples: Schema fields, permission checks, logging, helper refactors
# ============================================================

[tier3a]
enabled = true
model = "deepseek-v3"                   # Extended thinking variant
model_type = "vllm"
vllm_endpoint = "http://localhost:8001/v1"
use_thinking = true
thinking_budget = 10000
hf_cache = "/mnt/shared_workspace/huggingface"
use_aider = true
guardrail_file = "guardrails/tier3a-context.md"
aider_timeout_seconds = 600

[tier3a.self_audit]
tools = ["pytest", "ruff", "mypy", "compile", "bandit", "semgrep"]
max_files = 15
max_diff_size = 100000

[tier3a.review]
checks = ["audit_verdict", "diff_size", "file_count", "spec_adherence", "suspicious_patterns", "imports_check", "security_patterns"]

# ============================================================
# TIER 3b: High-Risk (Claude Opus Direct)
# Size: L/XL (300+ LOC, complex logic, auth/payments/security)
# Risk: High
# Cost: ~$0.40 generation + $0.05 review = $0.45/task
# Speed: 5-15 minutes
# Examples: Auth, payments, secrets, crypto, external APIs, async transactions
# ============================================================

[tier3b]
enabled = true
model = "claude-opus-4-7"               # Opus direct (no Spark intermediary)
api_key = "${ANTHROPIC_API_KEY}"
cost_budget = 100.0                     # Higher budget for high-risk work
cost_gate = true
security_review = true
full_test_suite = true

[tier3b.self_audit]
tools = ["pytest", "ruff", "mypy", "compile", "bandit", "semgrep"]
max_files = 20

[tier3b.review]
checks = ["audit_verdict", "diff_size", "file_count", "spec_adherence", "suspicious_patterns", "imports_check", "test_coverage", "security_patterns", "performance"]

# ============================================================
# Task Triage (Auto-Classification)
# ============================================================

[triage]
# LOC thresholds
xs_threshold = 20
s_threshold = 100
m_threshold = 500
l_threshold = 2000

# Risk scoring (0-100)
high_risk_keywords = ["auth", "payment", "secret", "security", "crypto", "delete", "drop", "admin"]
low_risk_keywords = ["docs", "log", "format", "typo", "rename", "comment"]

# ============================================================
# Guardrails (Optional)
# ============================================================

[guardrails]
# F2 Guardrail for tier-1 LLM (teach to ask on ambiguity)
tier1_enabled = true
tier1_file = "guardrails/tier1-f2.md"

# Custom instructions for tier-2/3
tier2_instructions = "guardrails/tier2-instructions.md"
tier3_instructions = "guardrails/tier3-instructions.md"

# ============================================================
# Observability & Monitoring
# ============================================================

[monitoring]
prometheus_enabled = false
prometheus_port = 8000

slack_webhook = ""  # Optional: notify on task completion
slack_failures_only = false

grafana_dashboard = false
grafana_url = ""

# ============================================================
# Development/Testing
# ============================================================

[development]
dry_run = false          # If true, don't actually merge
mock_lLM = false         # If true, use mock LLM responses for testing
save_diffs = true        # Save all diffs to diffs/ for review
verbose_logging = false
